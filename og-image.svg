<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="15%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#2d5a3d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1612" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#a0764a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1a1612" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1612"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Gold accent line at bottom -->
  <line x1="200" y1="628" x2="1000" y2="628" stroke="#c9a84c" stroke-opacity="0.4" stroke-width="2"/>

  <!-- Badge -->
  <rect x="80" y="180" width="200" height="28" rx="14" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-opacity="0.25" stroke-width="1"/>
  <text x="180" y="198" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#c9a84c" text-anchor="middle" letter-spacing="2">PERSONAL AI ASSISTANT</text>

  <!-- Headline -->
  <text x="80" y="270" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#f4eedf" letter-spacing="-2">Your life, one</text>
  <text x="80" y="345" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#c9a84c" font-style="italic" letter-spacing="-2">text message</text>
  <text x="465" y="345" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#f4eedf" letter-spacing="-2"> away</text>

  <!-- Subtitle -->
  <text x="80" y="395" font-family="system-ui, sans-serif" font-size="18" fill="#c8bfad" font-weight="400">An iMessage AI connected to your calendar, email,</text>
  <text x="80" y="420" font-family="system-ui, sans-serif" font-size="18" fill="#c8bfad" font-weight="400">health data, and knowledge base. Self-hosted.</text>

  <!-- Phone mockup -->
  <rect x="880" y="100" width="240" height="430" rx="32" fill="#2c2418" stroke="#c9a84c" stroke-opacity="0.1" stroke-width="1"/>
  <rect x="888" y="108" width="224" height="414" rx="26" fill="#0a0a0a"/>

  <!-- Phone notch -->
  <rect x="940" y="108" width="80" height="18" rx="0 0 10 10" fill="#0a0a0a"/>

  <!-- Messages -->
  <rect x="900" y="155" width="175" height="44" rx="12" fill="#1c1c1e"/>
  <text x="910" y="173" font-family="system-ui, sans-serif" font-size="9.5" fill="#e5e5e7">Good morning. Recovery 84%,</text>
  <text x="910" y="188" font-family="system-ui, sans-serif" font-size="9.5" fill="#e5e5e7">HRV trending up. 3 things today.</text>

  <rect x="960" y="210" width="140" height="30" rx="12" fill="#2d5a3d"/>
  <text x="970" y="229" font-family="system-ui, sans-serif" font-size="9.5" fill="#ffffff">Move accountant to 4:30.</text>

  <rect x="900" y="252" width="180" height="30" rx="12" fill="#1c1c1e"/>
  <text x="910" y="271" font-family="system-ui, sans-serif" font-size="9.5" fill="#e5e5e7">Done. 62°F and sunny at noon.</text>

  <!-- Logo -->
  <text x="80" y="560" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#f4eedf">Django <tspan fill="#c9a84c">AI</tspan></text>
</svg>
